<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="820" height="430" rx="0" fill="#0b0b12"/>

  <!-- window -->
  <g filter="url(#shadow)">
    <rect x="30" y="24" width="760" height="382" rx="12" fill="#1e1e2e"/>
    <!-- title bar -->
    <path d="M30 36 a12 12 0 0 1 12 -12 h736 a12 12 0 0 1 12 12 v28 h-760 z" fill="#2b2b3a"/>
    <circle cx="56" cy="46" r="7" fill="#ff5f56"/>
    <circle cx="80" cy="46" r="7" fill="#ffbd2e"/>
    <circle cx="104" cy="46" r="7" fill="#27c93f"/>
    <text x="410" y="51" text-anchor="middle" font-size="13" fill="#9aa0b4">fav — zsh — 80×24</text>
  </g>

  <!-- terminal body -->
  <g font-size="16" xml:space="preserve">
    <!-- prompt -->
    <text x="54" y="104"><tspan fill="#5af78e">kamil@macbook</tspan><tspan fill="#9aa0b4"> ~ %</tspan><tspan fill="#f8f8f2"> fav</tspan></text>

    <!-- header -->
    <text x="54" y="142" font-weight="bold" fill="#ff79c6"> Your favourites commands</text>
    <!-- separator -->
    <text x="54" y="168" fill="#6272a4">------------------------------------</text>

    <!-- list items -->
    <text x="54" y="200"><tspan fill="#8be9fd">   1)</tspan><tspan fill="#f8f8f2" font-weight="bold"> git push --force</tspan></text>
    <text x="54" y="228"><tspan fill="#8be9fd">   2)</tspan><tspan fill="#f8f8f2" font-weight="bold"> docker compose up -d --build</tspan></text>
    <text x="54" y="256"><tspan fill="#8be9fd">   3)</tspan><tspan fill="#f8f8f2" font-weight="bold"> kubectl get pods -A</tspan></text>

    <!-- pick prompt -->
    <text x="54" y="292"><tspan fill="#9aa0b4">Pick a number (Enter to cancel): </tspan><tspan fill="#f8f8f2" font-weight="bold">2</tspan></text>

    <!-- editable run line -->
    <text x="54" y="328"><tspan fill="#9aa0b4">&gt; </tspan><tspan fill="#f8f8f2">docker compose up -d --build</tspan></text>
    <rect x="343" y="315" width="9" height="18" fill="#f8f8f2" opacity="0.85"/>
  </g>
</svg>
